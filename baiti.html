<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <script>
            const kib_s = 25000 / 8; // 3125
            const kb_s = 24414.0625 / 8; // 3 051.757812
        </script>
        <form>
            <label for="sekundes">Aprēķināt cik daudz informācijas var lejuplādēt</label>
            <br>
            <input name="sekundes" id="šekundes" onfocus="document.querySelector('form').reset()"/>
            <label for="sekundes" value="">sekundēs, ja interneta ātrums ir 25Mbps</label>
            <br>
            <br>
            <label for="atbilde">Atbilde</label>
            <br>
            <br>
            <input name="atbilde" id="atbilde"/>
            
            
            <input name="vieniba" id="kib" type="radio" value="kib" onclick="atbilde.value = kb_s * Number(sekundes.value)"/>
            <label for="kib">KiB</label>
            
            <input name="vieniba" id="kb" type="radio" value="kib" onclick="atbilde.value = kib_s * Number(sekundes.value)"/>
            <label for="kb">KB</label>
        </form>
    </body>
</html>
